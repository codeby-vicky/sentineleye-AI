<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelEye AI</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/monitoring.css">
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
</head>
<body>
    <!-- Custom Titlebar -->
    <div class="titlebar">
        <div class="titlebar-drag-region"></div>
        <div class="titlebar-title">
            <svg class="titlebar-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            SentinelEye AI
        </div>
        <div class="titlebar-controls">
            <button class="titlebar-btn" id="btn-minimize">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button class="titlebar-btn" id="btn-maximize">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
            </button>
            <button class="titlebar-btn close" id="btn-close">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
    </div>

    <!-- Main App Container (No Sidebar) -->
    <div class="app-container">
        <!-- Main Content Area -->
        <main class="main-content" id="main-content">
            <!-- Loading Screen initially -->
            <div id="loading-screen" class="loading-screen">
                <div class="spinner"></div>
                <h2>Initializing AI Modules...</h2>
                <p id="loading-status">Connecting to backend...</p>
            </div>
            <!-- Pages will be dynamically injected here -->
        </main>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Audio Elements for Alerts -->
    <audio id="audio-alert" src="assets/sounds/alert.mp3" preload="auto"></audio>
    <audio id="audio-warning" src="assets/sounds/warning.mp3" preload="auto"></audio>
    <audio id="audio-critical" src="assets/sounds/critical.mp3" preload="auto"></audio>

    <!-- App Scripts -->
    <script src="js/api.js"></script>
    <script src="js/socket.js"></script>
    <script src="js/notifications.js"></script>
    
    <!-- Router MUST load before modules -->
    <script src="js/router.js"></script>

    <!-- Page Modules -->
    <script src="js/pages/setup.js"></script>
    <!-- Trusted Users removed -->
    <script src="js/pages/monitoring.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/settings.js"></script>
    
    <!-- App Init -->
    <script src="js/app.js"></script>
</body>
</html>
